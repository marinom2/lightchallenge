name: LightChallengeApp
options:
  bundleIdPrefix: io.lightchallenge
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: false
    SWIFT_ENABLE_EXPLICIT_MODULES: NO

packages:
  reown-swift:
    url: https://github.com/reown-com/reown-swift
    from: "1.0.0"

targets:
  LightChallengeApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.lightchallenge.app
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/LightChallengeApp.entitlements
        DEVELOPMENT_TEAM: "84SJ6FKXLJ"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: 3
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
    entitlements:
      path: Sources/LightChallengeApp.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:uat.lightchallenge.app
          - applinks:lightchallenge.app
        com.apple.security.application-groups:
          - group.io.lightchallenge.app
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    dependencies:
      - package: reown-swift
        product: ReownAppKit
      - target: LightChallengeWidgetExtension

  LightChallengeWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: LightChallengeWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.lightchallenge.app.widget
        DEVELOPMENT_TEAM: "84SJ6FKXLJ"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: 3
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        TARGETED_DEVICE_FAMILY: "1,2"
    entitlements:
      properties:
        com.apple.security.application-groups:
          - group.io.lightchallenge.app
