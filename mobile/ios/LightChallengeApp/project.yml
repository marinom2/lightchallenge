name: LightChallengeApp
options:
  bundleIdPrefix: io.lightchallenge
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: false

targets:
  LightChallengeApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.lightchallenge.healthcollector
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/LightChallengeApp.entitlements
        DEVELOPMENT_TEAM: ""  # ← SET YOUR APPLE TEAM ID HERE
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Sources/LightChallengeApp.entitlements
    info:
      path: Sources/Info.plist
    capabilities:
      - HealthKit
