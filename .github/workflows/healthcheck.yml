name: LightChain Healthcheck

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RPC_URL: ${{ vars.RPC_URL }}
      CHAIN_ID: ${{ vars.CHAIN_ID }}
      CHALLENGEPAY_ADDR: ${{ vars.CHALLENGEPAY_ADDR }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run healthcheck
        run: node ./scripts/ci/healthcheck.mjs
