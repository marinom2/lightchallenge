name: LightChain Healthcheck

on:
  workflow_dispatch:        # allow manual trigger from GitHub UI/gh CLI
  schedule:
    - cron: "0 */4 * * *"   # run every 4 hours

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RPC_URL: ${{ vars.RPC_URL }}
      CHAIN_ID: ${{ vars.CHAIN_ID }}
      CHALLENGEPAY_ADDR: ${{ vars.CHALLENGEPAY_ADDR }}
      EXPLORER_URL: ${{ vars.EXPLORER_URL }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run healthcheck
        run: node ./scripts/ci/healthcheck.mjs